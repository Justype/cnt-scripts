name: Run all auto.py

on:
  schedule:
    - cron: '0 0 1,15 * *'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  run-auto-py:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Run all auto.py scripts
        run: |
          chmod +x .github/scripts/run_all_auto_py.sh
          .github/scripts/run_all_auto_py.sh | tee /tmp/auto_py_output.txt

      - name: Create PR if new scripts are added
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          # Add any changes under build-scripts and helpers (any file type)
          git add build-scripts helpers

          # Check if there are changes to commit
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi

          BRANCH="auto-py/$(date +'%Y-%m-%d')"
          git checkout -b "$BRANCH"
          git commit -m "Update build scripts using auto.py ($(date +'%Y-%m-%d'))"
          git push origin "$BRANCH"

          # Keep only [UPDATED] and [INFO] lines; discard [SKIP] noise
          UPDATES="$(grep -E '^\[UPDATED\]|^\[INFO\]' /tmp/auto_py_output.txt || true)"

          {
            echo '```'
            echo "$UPDATES"
            echo '```'
          } > /tmp/pr_body.txt

          gh pr create \
            --title "Update build scripts using auto.py ($(date +'%Y-%m-%d'))" \
            --body-file /tmp/pr_body.txt \
            --base main \
            --head "$BRANCH"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
