name: Run all auto.py monthly

on:
  schedule:
    - cron: '0 0 1 * *'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  run-auto-py:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Run all auto.py scripts
        run: |
          chmod +x .github/scripts/run_all_auto_py.sh
          .github/scripts/run_all_auto_py.sh

      - name: Create PR if new scripts are added
        run: |
          git config user.name "dependabot[bot]"
          git config user.email "dependabot[bot]@users.noreply.github.com"

          # Add any changes under build-scripts (any file type)
          git add build-scripts

          # Check if there are changes to commit
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi

          BRANCH="auto-py/$(date +'%Y-%m')"
          git checkout -b "$BRANCH"
          git commit -m "Update build scripts using auto.py ($(date +'%Y-%m'))"
          git push origin "$BRANCH"

          gh pr create \
            --title "Update build scripts using auto.py ($(date +'%Y-%m'))" \
            --body "Automated monthly update from \`auto.py\` scripts. Please review the changed build script versions before merging." \
            --base main \
            --head "$BRANCH"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
